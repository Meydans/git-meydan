<!DOCTYPE html>
<html lang="he" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שותפים לבית - Home Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1', // Indigo 500
                        secondary: '#10b981', // Emerald 500
                        accent: '#f59e0b', // Amber 500
                        danger: '#ef4444', // Red 500
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        .checkbox-custom:checked + div {
            background-color: #10b981;
            border-color: #10b981;
        }
        .checkbox-custom:checked + div svg {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-300 antialiased overflow-hidden flex justify-center">

    <!-- App Container (Mobile Sized) -->
    <div id="app" class="w-full max-w-md bg-white dark:bg-gray-800 h-[100dvh] shadow-2xl relative flex flex-col overflow-hidden sm:border-x border-gray-200 dark:border-gray-700">
        
        <!-- Header -->
        <header class="pt-12 pb-4 px-6 bg-gradient-to-r from-primary to-indigo-600 text-white rounded-b-3xl shadow-lg z-20 flex justify-between items-center flex-shrink-0 transition-all duration-300">
            <div class="flex items-center gap-3">
                <button id="backBtn" class="hidden p-2 bg-white/20 rounded-full hover:bg-white/30 transition backdrop-blur-sm">
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
                <div>
                    <h1 class="text-2xl font-black tracking-tight" id="headerTitle">שותפים לבית</h1>
                    <p class="text-indigo-100 text-sm font-medium opacity-90" id="headerSubtitle">הבית של כולנו</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="themeToggle" class="p-2.5 bg-white/20 rounded-full hover:bg-white/30 transition backdrop-blur-sm shadow-sm">
                    <i data-lucide="moon" id="themeIcon" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Scrollable Content Area -->
        <main id="mainContent" class="flex-1 overflow-y-auto overflow-x-hidden relative z-10 pb-24 bg-gray-50 dark:bg-gray-900">
            <!-- Views injected here by JS -->
        </main>
        
        <!-- Bottom Navigation (Parent View Only) -->
        <nav id="bottomNav" class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-700 flex justify-around p-2 pb-6 absolute bottom-0 w-full z-30 transition-transform duration-300 hidden">
            <button class="nav-btn flex flex-col items-center p-2 text-primary flex-1" data-view="parent-dashboard">
                <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">בקרה</span>
            </button>
            <button class="nav-btn flex flex-col items-center p-2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition flex-1" data-view="tasks-manager">
                <i data-lucide="list-todo" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">מטלות</span>
            </button>
            
            <!-- Sprint Button (Center FAB) -->
            <div class="relative -top-6 flex-1 flex justify-center">
                <button id="startSprintNavBtn" class="flex flex-col items-center justify-center bg-accent text-white w-16 h-16 rounded-full shadow-[0_8px_16px_rgba(245,158,11,0.4)] border-4 border-white dark:border-gray-800 transform transition active:scale-95 hover:-translate-y-1">
                    <i data-lucide="zap" class="w-7 h-7 fill-current"></i>
                </button>
            </div>

            <button class="nav-btn flex flex-col items-center p-2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition flex-1" data-view="family-setup">
                <i data-lucide="users" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">צוות</span>
            </button>
            <button class="nav-btn flex flex-col items-center p-2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition flex-1" data-view="ai-assistant">
                <i data-lucide="sparkles" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">עוזר חכם</span>
            </button>
        </nav>

        <!-- Overlays -->
        
        <!-- Sprint Timer Overlay -->
        <div id="sprintOverlay" class="fixed inset-0 bg-primary/95 text-white z-50 flex-col items-center justify-center p-6 text-center backdrop-blur-md hidden transition-opacity duration-300 opacity-0">
            <div class="animate-bounce mb-8">
                <i data-lucide="rocket" class="w-24 h-24 mx-auto text-accent"></i>
            </div>
            <h2 class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-accent">טירוף ניקיון!</h2>
            <p class="text-xl mb-12 text-indigo-100">כולם עובדים עכשיו ביחד!</p>
            
            <div class="relative w-64 h-64 mx-auto mb-12 flex items-center justify-center">
                <svg class="absolute inset-0 w-full h-full transform -rotate-90">
                    <circle cx="128" cy="128" r="120" stroke="rgba(255,255,255,0.2)" stroke-width="8" fill="none" />
                    <circle id="sprintProgress" cx="128" cy="128" r="120" stroke="#f59e0b" stroke-width="8" fill="none" stroke-dasharray="754" stroke-dashoffset="0" class="transition-all duration-1000 linear" stroke-linecap="round"/>
                </svg>
                <div id="sprintTimerDisplay" class="text-6xl font-mono font-bold drop-shadow-lg tabular-nums tracking-tight">20:00</div>
            </div>
            
            <button id="stopSprintBtn" class="bg-white text-primary px-8 py-4 rounded-2xl font-bold text-xl hover:bg-gray-100 transition-colors shadow-xl active:scale-95 w-full max-w-xs">
                עצור טיימר
            </button>
        </div>

        <!-- Unlock Overlay -->
        <div id="unlockOverlay" class="fixed inset-0 bg-gray-900/90 text-white z-50 flex-col items-center justify-center p-6 text-center backdrop-blur-lg hidden transition-opacity duration-300 opacity-0">
            <div class="relative">
                <div class="absolute inset-0 bg-accent rounded-full blur-3xl opacity-30 animate-pulse"></div>
                <i data-lucide="unlock" class="w-32 h-32 text-accent mb-8 relative z-10 animate-bounce"></i>
            </div>
            <h2 class="text-4xl font-black mb-4 text-accent">משימות הושלמו!</h2>
            <p class="text-xl mb-8 text-gray-300">כל משימות החובה להיום בוצעו.</p>
            <div class="bg-gray-800/50 rounded-2xl p-6 mb-10 border border-gray-700 w-full max-w-xs">
                <p class="font-medium flex items-center justify-center gap-2 text-green-400">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    זמן פנוי זמין עכשיו
                </p>
            </div>
            <button id="closeUnlockBtn" class="bg-accent text-white px-10 py-4 rounded-2xl font-black text-xl shadow-[0_0_20px_rgba(245,158,11,0.5)] active:scale-95 transition-transform w-full max-w-xs">
                יש! תודה!
            </button>
        </div>

        <!-- Feedback Modal -->
        <div id="feedbackModal" class="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm hidden transition-opacity duration-300 opacity-0">
            <div class="bg-white dark:bg-gray-800 rounded-3xl p-8 text-center max-w-sm w-full shadow-2xl transform transition-all scale-95 opacity-0" id="feedbackModalContent">
                <div class="relative inline-block mb-6">
                    <div class="absolute inset-0 bg-secondary rounded-full blur-xl opacity-40"></div>
                    <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-secondary rounded-full flex items-center justify-center relative shadow-inner">
                        <i data-lucide="award" class="w-12 h-12 text-white"></i>
                    </div>
                </div>
                <h3 class="text-3xl font-black mb-4 text-gray-800 dark:text-white" id="feedbackTitle">אלופה!</h3>
                <div class="min-h-[80px] flex items-center justify-center mb-8 relative">
                    <i data-lucide="quote" class="absolute -top-2 -right-2 w-8 h-8 text-gray-200 dark:text-gray-700 opacity-50 rotate-180"></i>
                    <p id="feedbackText" class="text-lg text-gray-600 dark:text-gray-300 font-medium leading-relaxed relative z-10">
                        נטען פידבק מהעוזר החכם...
                    </p>
                </div>
                <button id="closeFeedbackBtn" class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 w-full py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
                    המשך
                </button>
            </div>
        </div>

        <!-- Global Toast -->
        <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl font-medium text-sm z-50 transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px]">
            הודעה
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        // ==========================================
        const AVATARS = ['😊', '😎', '👸', '🦸‍♂️', '🦸‍♀️', '🥷', '🦄', '🦖', '🤖', '👽'];
        
        let state = {
            users: [], // { id, name, age, avatar, role: 'parent'|'child' }
            tasks: [], // { id, title, assignees: [userIds], frequency: 'daily'|'weekly', subtasks: [{title, isDone}], isMandatory: boolean, requireProof: boolean }
            dailyStatus: {}, // { dateString: { taskId: { userId: { isDone, proofUrl } } } }
            currentUser: null // id
        };

        // ==========================================
        // CORE UTILS
        // ==========================================
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }

        function saveState() {
            localStorage.setItem('homePartnersState', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('homePartnersState');
            if (saved) {
                state = JSON.parse(saved);
                // Ensure daily status exists for today
                const today = getTodayStr();
                if (!state.dailyStatus[today]) {
                    state.dailyStatus[today] = {};
                }
            } else {
                // Initialize first time
                state.dailyStatus[getTodayStr()] = {};
                saveState();
            }
        }

        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            if(type === 'error') toast.classList.add('bg-danger');
            else toast.classList.remove('bg-danger');
            
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
            }, 3000);
        }

        // ==========================================
        // AI INTEGRATION (GEMINI)
        // ==========================================
        async function callGemini(prompt, isJson = false) {
            try {
                const response = await fetch("/api/gemini", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, model: "gemini-2.0-flash" })
                });
                
                if (!response.ok) {
                    throw new Error('שגיאה בתקשורת מול ה-Proxy');
                }
                
                const rawData = await response.json();
                let text = rawData.candidates?.[0]?.content?.parts?.[0]?.text || '';
                
                if (isJson) {
                    text = text.replace(/```(?:json)?/gi, '').trim();
                    
                    const firstBracket = text.indexOf('[');
                    const firstBrace = text.indexOf('{');
                    let start = -1;
                    if (firstBracket !== -1 && firstBrace !== -1) start = Math.min(firstBracket, firstBrace);
                    else if (firstBracket !== -1) start = firstBracket;
                    else start = firstBrace;
                    
                    if (start !== -1) {
                        const endBracket = text.lastIndexOf(']');
                        const endBrace = text.lastIndexOf('}');
                        let end = Math.max(endBracket, endBrace);
                        text = text.substring(start, end + 1);
                    }
                }
                
                return text;
            } catch (error) {
                console.error("Gemini Error:", error);
                throw error;
            }
        }

        async function getPersonalizedFeedback(taskTitle, childName, childAge) {
            const fallbackMsgs = [
                `כל הכבוד ${childName}! עבודה מעולה.`,
                `תותח! הבית נראה יותר טוב עכשיו.`,
                `מדהים! סיימת את "${taskTitle}".`
            ];

            const prompt = `אתה אפליקציה שמחה שמתגמלת ילדים על ביצוע מטלות בית.
הילד/ה בשם ${childName} (גיל ${childAge}) הרגע סיים/מה את המטלה: "${taskTitle}".
כתוב משפט פרגון אחד קצר, מצחיק, מלהיב ולא צפוי (עד 15 מילים). בעברית. השתמש באימוג'י מתאים.`;

            try {
                const res = await callGemini(prompt);
                return res.trim();
            } catch (e) {
                return fallbackMsgs[Math.floor(Math.random() * fallbackMsgs.length)];
            }
        }

        async function generateTasksFromAI(age) {
            const prompt = `תציע 3 מטלות בית ראליות, מתאימות ומעצימות לילד/ה בגיל ${age}.
לכל מטלה, ספק שם קצר, וצ'ק ליסט של 2-3 תתי-משימות קטנות שעוזרות להבין איך לבצע אותה.
החזר אך ורק אובייקט JSON תקין (ללא markdown) בפורמט הבא:
[{"title": "שם המטלה", "subtasks": [{"title": "תת משימה 1"}, {"title": "תת משימה 2"}]}]`;

            try {
                const res = await callGemini(prompt, true);
                return JSON.parse(res);
            } catch (e) {
                console.error("Failed to parse JSON from Gemini", e);
                throw new Error("לא הצלחנו לייצר מטלות. נסה שוב.");
            }
        }
        
        async function decideRotationAI(childrenNames) {
            const prompt = `יש ויכוח בין הילדים הבאים על מי תורו לעשות את המטלה: ${childrenNames.join(', ')}.
תבחר באקראי לחלוטין אחד מהם.
תחזיר אובייקט JSON תקין (ללא markdown) עם השם הנבחר ונימוק משעשע וניטרלי (כמו שופט רובוט) למה נבחר. בפורמט הבא:
{"chosen": "שם", "reason": "הנימוק המשעשע"}`;
            try {
                const res = await callGemini(prompt, true);
                return JSON.parse(res);
            } catch(e) {
                // fallback
                const randomChild = childrenNames[Math.floor(Math.random() * childrenNames.length)];
                return { chosen: randomChild, reason: "עשיתי אן-דן-דינו וזה מה שיצא!" };
            }
        }

        // ==========================================
        // UI RENDERING & NAVIGATION
        // ==========================================
        const mainContent = document.getElementById('mainContent');
        const headerTitle = document.getElementById('headerTitle');
        const headerSubtitle = document.getElementById('headerSubtitle');
        const bottomNav = document.getElementById('bottomNav');
        const backBtn = document.getElementById('backBtn');

        function renderView(viewName, params = {}) {
            mainContent.innerHTML = '';
            
            // Default styling
            backBtn.classList.add('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.view === viewName) {
                    btn.classList.replace('text-gray-400', 'text-primary');
                    btn.classList.replace('dark:text-gray-500', 'text-primary');
                } else {
                    btn.classList.replace('text-primary', 'text-gray-400');
                    btn.classList.add('dark:text-gray-500');
                }
            });

            switch(viewName) {
                case 'login':
                    renderLogin();
                    break;
                case 'family-setup':
                    renderFamilySetup();
                    break;
                case 'parent-dashboard':
                    renderParentDashboard();
                    break;
                case 'tasks-manager':
                    renderTasksManager();
                    break;
                case 'ai-assistant':
                    renderAIAssistant();
                    break;
                case 'child-dashboard':
                    renderChildDashboard(params.userId);
                    break;
                case 'task-detail':
                    renderTaskDetail(params.taskId, params.userId);
                    break;
            }
            
            lucide.createIcons();
        }

        // --- View: Login / User Select ---
        function renderLogin() {
            bottomNav.classList.add('hidden');
            headerTitle.textContent = "ברוכים הבאים";
            headerSubtitle.textContent = "מי נכנס עכשיו?";

            if (state.users.length === 0) {
                const wrapper = document.createElement('div');
                wrapper.className = "flex flex-col items-center justify-center h-full p-6 text-center slide-up";
                wrapper.innerHTML = `
                    <div class="bg-indigo-100 dark:bg-indigo-900/30 w-24 h-24 rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="home" class="w-12 h-12 text-primary"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-3">נראה שאין עדיין צוות!</h2>
                    <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-xs">בואו נגדיר את בני המשפחה ונתחיל להפוך את ניהול הבית למשחק.</p>
                    <button id="startSetupBtn" class="bg-primary text-white px-8 py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-indigo-600 transition-colors w-full">התחל כאן</button>
                `;
                mainContent.appendChild(wrapper);
                document.getElementById('startSetupBtn').onclick = () => renderView('family-setup');
                return;
            }

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 gap-4 p-6 slide-up";
            
            state.users.forEach(user => {
                const btn = document.createElement('button');
                btn.className = "bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center gap-4 hover:shadow-md transition active:scale-95";
                btn.innerHTML = `
                    <div class="text-5xl bg-gray-50 dark:bg-gray-700 w-20 h-20 rounded-full flex items-center justify-center shadow-inner relative">
                        ${user.avatar}
                        ${user.role === 'parent' ? '<div class="absolute -top-1 -right-1 bg-accent rounded-full p-1 shadow"><i data-lucide="crown" class="w-3 h-3 text-white"></i></div>' : ''}
                    </div>
                    <div class="font-bold text-lg">${user.name}</div>
                `;
                btn.onclick = () => {
                    state.currentUser = user.id;
                    saveState();
                    if (user.role === 'parent') {
                        renderView('parent-dashboard');
                    } else {
                        renderView('child-dashboard', {userId: user.id});
                    }
                };
                grid.appendChild(btn);
            });
            mainContent.appendChild(grid);
        }

        // --- View: Parent Dashboard ---
        function renderParentDashboard() {
            bottomNav.classList.remove('hidden');
            headerTitle.textContent = "לוח בקרה";
            headerSubtitle.textContent = "מבט על על הבית";
            
            const today = getTodayStr();
            const todayStatus = state.dailyStatus[today] || {};
            
            let totalTasks = 0;
            let completedTasks = 0;
            
            state.tasks.forEach(task => {
                task.assignees.forEach(userId => {
                    totalTasks++;
                    if(todayStatus[task.id] && todayStatus[task.id][userId] && todayStatus[task.id][userId].isDone) {
                        completedTasks++;
                    }
                });
            });

            const progressPct = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

            const html = `
                <div class="p-6 slide-up space-y-6">
                    <!-- Progress Card -->
                    <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-primary opacity-5 rounded-bl-full"></div>
                        <h3 class="font-bold text-gray-500 dark:text-gray-400 mb-2">התקדמות יומית</h3>
                        <div class="flex items-end gap-2 mb-4">
                            <span class="text-4xl font-black">${progressPct}%</span>
                            <span class="text-sm text-gray-400 mb-1">(${completedTasks}/${totalTasks} מטלות)</span>
                        </div>
                        <div class="h-3 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-primary to-secondary transition-all duration-1000 rounded-full" style="width: ${progressPct}%"></div>
                        </div>
                    </div>

                    <!-- Children Status -->
                    <div>
                        <h3 class="font-bold text-lg mb-4">סטטוס צוות</h3>
                        <div class="space-y-3">
                            ${state.users.filter(u => u.role === 'child').map(child => {
                                let childTotal = 0;
                                let childDone = 0;
                                state.tasks.filter(t => t.assignees.includes(child.id)).forEach(t => {
                                    childTotal++;
                                    if(todayStatus[t.id] && todayStatus[t.id][child.id]?.isDone) childDone++;
                                });
                                
                                const pct = childTotal === 0 ? 0 : Math.round((childDone / childTotal) * 100);
                                const isAllDone = childTotal > 0 && childTotal === childDone;

                                return `
                                <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer" onclick="renderView('child-dashboard', {userId: '${child.id}'})">
                                    <div class="text-3xl bg-gray-50 dark:bg-gray-700 w-12 h-12 rounded-full flex items-center justify-center relative">
                                        ${child.avatar}
                                        ${isAllDone ? '<div class="absolute -bottom-1 -right-1 bg-green-500 rounded-full p-0.5"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>' : ''}
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex justify-between mb-1">
                                            <span class="font-bold">${child.name}</span>

        function renderChildDashboard(childId) {
            bottomNav.classList.add('hidden');

                // If current user is parent viewing child, go back to parent dashboard
                const actingUser = state.users.find(u => u.id === state.currentUser);
                if(actingUser && actingUser.role === 'parent') {
                    renderView('parent-dashboard');
                } else {
                    state.currentUser = null;
                    saveState();
                    renderView('login');
                }
            };

            const child = state.users.find(u => u.id === childId);
            headerTitle.textContent = `היי ${child.name}!`;
            headerSubtitle.textContent = "המשימות שלך להיום";

            const today = getTodayStr();
            const myTasks = state.tasks.filter(t => t.assignees.includes(childId));
            const todayStatus = state.dailyStatus[today];

            if(myTasks.length === 0) {
                mainContent.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-6 text-center slide-up">
                        <div class="text-6xl mb-4 animate-bounce">🎉</div>

                    </div>
                `;
                return;
            }

            let tasksHtml = '';
            let mandatoryCount = 0;
            let mandatoryDone = 0;

            myTasks.forEach(task => {
                const status = todayStatus[task.id]?.[childId] || { isDone: false };
                const isDone = status.isDone;
                
                if (task.isMandatory) {
                    mandatoryCount++;
                    if (isDone) mandatoryDone++;
                }

                // Calculate subtasks progress if not fully done
                let progressHtml = '';
                if(!isDone && task.subtasks && task.subtasks.length > 0) {
                    const stDone = status.subtasks ? status.subtasks.filter(st=>st.isDone).length : 0;
                    progressHtml = `
                        <div class="mt-3 flex items-center gap-2">
                            <div class="flex-1 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-primary" style="width: ${(stDone/task.subtasks.length)*100}%"></div>
                            </div>
                            <span class="text-xs text-gray-500 font-medium">${stDone}/${task.subtasks.length}</span>
                        </div>
                    `;
                }

                tasksHtml += `
                    <div onclick="${isDone ? '' : `renderView('task-detail', {taskId: '${task.id}', userId: '${childId}'})`}" 
                         class="bg-white dark:bg-gray-800 p-5 rounded-3xl shadow-sm border ${isDone ? 'border-green-200 dark:border-green-800 bg-green-50/50 dark:bg-green-900/10 opacity-70' : 'border-gray-100 dark:border-gray-700'} mb-4 cursor-pointer transform transition active:scale-95 ${isDone ? '' : 'hover:shadow-md border-b-4 border-b-gray-200 dark:border-b-gray-600'}">
                        
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center border-2 ${isDone ? 'bg-secondary border-secondary text-white' : 'border-gray-300 dark:border-gray-600 text-transparent'}">
                                <i data-lucide="check" class="w-6 h-6 ${isDone ? 'block' : 'hidden'}"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-lg ${isDone ? 'text-gray-500 line-through decoration-2' : ''} flex items-center gap-2">
                                    ${task.title}
                                    ${task.isMandatory && !isDone ? '<i data-lucide="star" class="w-4 h-4 text-accent fill-current"></i>' : ''}
                                </h3>
                                ${!isDone && task.isMandatory ? '<span class="text-xs font-bold text-accent bg-amber-100 dark:bg-amber-900/40 px-2 py-0.5 rounded-md mt-1 inline-block">חובה להיום</span>' : ''}
                                ${progressHtml}
                            </div>
                            ${!isDone ? '<i data-lucide="chevron-left" class="text-gray-300"></i>' : ''}
                        </div>
                    </div>
                `;
            });

            // Unlock logic check
            const shouldUnlock = mandatoryCount > 0 && mandatoryCount === mandatoryDone;
            // Store if we already showed unlock today
            const unlockKey = `unlocked_${today}_${childId}`;
            if (shouldUnlock && !localStorage.getItem(unlockKey)) {
                setTimeout(() => showUnlockAnimation(unlockKey), 500);
            }

            mainContent.innerHTML = `
                <div class="p-6 slide-up">
                    ${mandatoryCount > 0 ? `
                        <div class="bg-gray-800 text-white p-4 rounded-2xl mb-6 flex items-center justify-between shadow-lg">
                            <div>
                                <div class="text-sm text-gray-400 font-bold mb-1">התקדמות למסכים / חברים</div>
                                <div class="font-black text-lg text-accent">${mandatoryDone} מתוך ${mandatoryCount} חובה</div>
                            </div>
                            <i data-lucide="${shouldUnlock ? 'unlock' : 'lock'}" class="w-8 h-8 ${shouldUnlock ? 'text-green-400' : 'text-gray-500'}"></i>
                        </div>
                    ` : ''}
                    
                    <div class="space-y-2">
                        ${tasksHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- View: Task Detail (Checklist) ---
        function renderTaskDetail(taskId, userId) {
            const task = state.tasks.find(t => t.id === taskId);
            const child = state.users.find(u => u.id === userId);
            const today = getTodayStr();
            
            // Initialize status object if missing
            if (!state.dailyStatus[today][taskId]) state.dailyStatus[today][taskId] = {};
            if (!state.dailyStatus[today][taskId][userId]) {
                state.dailyStatus[today][taskId][userId] = { 
                    isDone: false, 
                    subtasks: task.subtasks.map(st => ({title: st.title, isDone: false}))
                };
            }
            
            const status = state.dailyStatus[today][taskId][userId];

            headerTitle.textContent = "משימה";
            headerSubtitle.textContent = task.title;
            bottomNav.classList.add('hidden');
            backBtn.classList.remove('hidden');
            backBtn.onclick = () => renderView('child-dashboard', {userId});

            let subtasksHtml = '';
            
            if (status.subtasks && status.subtasks.length > 0) {
                status.subtasks.forEach((st, idx) => {
                    subtasksHtml += `
                        <label class="flex items-center gap-4 p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-95 transition-transform">
                            <input type="checkbox" class="checkbox-custom hidden" ${st.isDone ? 'checked' : ''} onchange="toggleSubtask('${taskId}', '${userId}', ${idx}, this.checked)">
                            <div class="w-8 h-8 rounded-full border-2 border-gray-300 dark:border-gray-600 flex items-center justify-center transition-colors">
                                <i data-lucide="check" class="w-5 h-5 text-white hidden"></i>
                            </div>
                            <span class="text-lg font-medium select-none ${st.isDone ? 'text-gray-400 line-through' : ''}">${st.title}</span>
                        </label>
                    `;
                });
            } else {
                subtasksHtml = `
                    <div class="text-center py-10 text-gray-500">
                        <div class="w-24 h-24 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="zap" class="w-10 h-10 text-primary"></i>
                        </div>
                        <p class="text-lg font-bold">לחצו על "סיימתי" כשאתם מוכנים!</p>
                    </div>
                `;
            }

            mainContent.innerHTML = `
                <div class="p-6 slide-up flex flex-col h-full">
                    <div class="flex-1 space-y-3 mb-6">
                        ${subtasksHtml}
                    </div>
                    
                    <button onclick="finishTask('${taskId}', '${userId}')" id="finishTaskBtn" class="w-full bg-secondary text-white py-5 rounded-3xl font-black text-2xl shadow-[0_8px_0_rgb(5,150,105)] hover:mt-2 hover:shadow-[0_0px_0_rgb(5,150,105)] active:mt-2 active:shadow-none transition-all">
                        סיימתי! 🎉
                    </button>
                </div>
            `;
            lucide.createIcons();
            
            // Check if button should be enabled based on subtasks
            updateFinishButtonState(taskId, userId);
        }

        window.toggleSubtask = (taskId, userId, subtaskIdx, isChecked) => {
            const today = getTodayStr();
            state.dailyStatus[today][taskId][userId].subtasks[subtaskIdx].isDone = isChecked;
            saveState();
            
            // re-render the label styling without full re-render
            renderTaskDetail(taskId, userId);
        };

        function updateFinishButtonState(taskId, userId) {
            const today = getTodayStr();
            const status = state.dailyStatus[today][taskId][userId];
            const btn = document.getElementById('finishTaskBtn');
            
            if (status.subtasks && status.subtasks.length > 0) {
                const allDone = status.subtasks.every(st => st.isDone);
                if (allDone) {
                    btn.classList.remove('opacity-50', 'pointer-events-none', 'grayscale');
                    btn.classList.add('animate-pulse');
                } else {
                    btn.classList.add('opacity-50', 'pointer-events-none', 'grayscale');
                    btn.classList.remove('animate-pulse');
                }
            }
        }

        window.finishTask = async (taskId, userId) => {
            const today = getTodayStr();
            state.dailyStatus[today][taskId][userId].isDone = true;
            saveState();

            // Fire confetti
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#10b981', '#f59e0b']
            });

            // Show Feedback Modal
            const task = state.tasks.find(t=>t.id === taskId);
            const child = state.users.find(u=>u.id === userId);
            
            const modal = document.getElementById('feedbackModal');
            const modalContent = document.getElementById('feedbackModalContent');
            const feedbackText = document.getElementById('feedbackText');
            
            modal.classList.remove('hidden');
            // Allow display block to apply before animating opacity
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
            
            feedbackText.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-6 h-6 mx-auto text-primary"></i>';
            lucide.createIcons();

            const msg = await getPersonalizedFeedback(task.title, child.name, child.age);
            feedbackText.textContent = msg;

            document.getElementById('closeFeedbackBtn').onclick = () => {
                modal.classList.add('opacity-0');
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    renderView('child-dashboard', {userId});
                }, 300);
            };
        };

        // ==========================================
        // GAMIFICATION OVERLAYS
        // ==========================================
        
        function showUnlockAnimation(storageKey) {
            const overlay = document.getElementById('unlockOverlay');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.3 }, zIndex: 100 });
            
            localStorage.setItem(storageKey, 'true');

            document.getElementById('closeUnlockBtn').onclick = () => {
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            };
        }

        // --- Sprint Timer Logic ---
        let sprintInterval;
        let sprintSecondsLeft = 20 * 60; // 20 mins

        const sprintOverlay = document.getElementById('sprintOverlay');
        const sprintTimerDisplay = document.getElementById('sprintTimerDisplay');
        const sprintProgress = document.getElementById('sprintProgress');
        
        // Navigation button binding
        document.getElementById('startSprintNavBtn').onclick = () => {
            if (state.users.filter(u=>u.role==='child').length === 0) {
                return showToast('אין ילדים בצוות להזניק', 'error');
            }
            startSprint();
        };

        function startSprint() {
            sprintOverlay.classList.remove('hidden');
            setTimeout(() => sprintOverlay.classList.remove('opacity-0'), 10);
            
            sprintSecondsLeft = 20 * 60;
            updateSprintUI();
            
            clearInterval(sprintInterval);
            sprintInterval = setInterval(() => {
                sprintSecondsLeft--;
                updateSprintUI();
                if(sprintSecondsLeft <= 0) {
                    clearInterval(sprintInterval);
                    endSprint();
                }
            }, 1000);
        }

        function updateSprintUI() {
            const m = Math.floor(sprintSecondsLeft / 60).toString().padStart(2, '0');
            const s = (sprintSecondsLeft % 60).toString().padStart(2, '0');
            sprintTimerDisplay.textContent = `${m}:${s}`;
            
            // Update SVG circle stroke (total length ~754)
            const total = 20 * 60;
            const pct = sprintSecondsLeft / total;
            const offset = 754 - (pct * 754);
            sprintProgress.style.strokeDashoffset = offset;
        }

        function endSprint() {
            confetti({ particleCount: 200, spread: 160 });
            sprintOverlay.classList.add('opacity-0');
            setTimeout(() => sprintOverlay.classList.add('hidden'), 300);
            showToast('טירוף הניקיון הסתיים! כל הכבוד!');
        }

        document.getElementById('stopSprintBtn').onclick = () => {
            clearInterval(sprintInterval);
            sprintOverlay.classList.add('opacity-0');
            setTimeout(() => sprintOverlay.classList.add('hidden'), 300);
        };

        // ==========================================
        // APP INITIALIZATION
        // ==========================================
        
        // Theme toggle logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function setTheme(isDark) {
            if(isDark) {
                document.documentElement.classList.add('dark');
                themeIcon.setAttribute('data-lucide', 'sun');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.setAttribute('data-lucide', 'moon');
                localStorage.setItem('theme', 'light');
            }
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            setTheme(!isDark);
        });

        // Setup bottom nav listeners
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.dataset.view;
                if(view) renderView(view);
            });
        });

        function initApp() {
            // Load theme
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                setTheme(true);
            } else {
                setTheme(false);
            }

            loadState();
            
            // Route based on state
            if (!state.currentUser) {
                renderView('login');
            } else {
                const user = state.users.find(u => u.id === state.currentUser);
                if (user) {
                    if (user.role === 'parent') renderView('parent-dashboard');
                    else renderView('child-dashboard', {userId: user.id});
                } else {
                    state.currentUser = null;
                    renderView('login');
                }
            }
        }

        // Start
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
